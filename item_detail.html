<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-3 Capstone Project</title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
    <link rel="stylesheet" href="CSS/style.css">
  </head>


  <body class="main-body">

  <!--* Top Nav bar section -->
    <!-- Navigation placeholder -->
      <div id="navbar-container"></div>

    <!-- Load navbar script -->
      <script src="script/navbar.js"></script>

    <!-- Start of item_detail section -->
    
    <div class="container item-container">
    
      <div class="item-btn-group-top">
        <a href="catalog.html"><button type="button" class="btn btn-primary btn-sm">Back to catalog</button></a>
        <a href="#"><button type="button" class="btn btn-secondary btn-sm">Request Item</button></a>
      </div>
        
      <!-- first row -->
      <div class="row">
        <!-- left col -->
        <div class="col p-4 p-md-5 mb-4 text-body-emphasis bg-warning-subtle">
          <div>
            <h4 class="fst-italic">Item Name</h4>
            <ul class="list-unstyled">
              <li>
                <a class="d-flex flex-column flex-lg-row gap-3 align-items-start align-items-lg-center py-3 link-body-emphasis text-decoration-none border-top" href="#">
                  <svg class="bd-placeholder-img" width="100%" height="96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice"><rect width="100%" height="100%" fill="#777"></rect></svg>
                  <div class="col-lg-8">
                    <h6 class="mb-0">View 1</h6>
                  </div>
                </a>
              </li>
              <li>
                <a class="d-flex flex-column flex-lg-row gap-3 align-items-start align-items-lg-center py-3 link-body-emphasis text-decoration-none border-top" href="#">
                  <svg class="bd-placeholder-img" width="100%" height="96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice"><rect width="100%" height="100%" fill="#777"></rect></svg>
                  <div class="col-lg-8">
                    <h6 class="mb-0">View 2</h6>
                  </div>
                </a>
              </li>
              <li>
                <a class="d-flex flex-column flex-lg-row gap-3 align-items-start align-items-lg-center py-3 link-body-emphasis text-decoration-none border-top" href="#">
                  <svg class="bd-placeholder-img" width="100%" height="96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice"><rect width="100%" height="100%" fill="#777"></rect></svg>
                  <div class="col-lg-8">
                    <h6 class="mb-0">View 3</h6>
                  </div>
                </a>
              </li>
            </ul>
          </div>
        </div>

        <!-- right col -->
        <div class="col p-4 p-md-5 mb-4 text-body-emphasis bg-success-subtle">
          <div class="px-0">
            <svg class="bd-placeholder-img item-main-img" width="100%" height="284" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice"><rect width="100%" height="100%" fill="#777"></rect></svg>
            <h1 class="display-9 fst-italic">Item Condition</h1>
            <p class="my-3">Multiple lines of text that form the lede, informing new readers quickly and efficiently about what’s most interesting in this post’s contents.</p>
          </div>
        </div>
      </div>
    
      <div class="item-btn-group-bottom">
       <a href="#"><button type="button" class="btn btn-primary btn-sm">&lt; Prev</button></a>
       <a href="#"><button type="button" class="btn btn-secondary btn-sm">Next &gt;</button></a>
      </div>
      
    </div>
    <!-- End of item_detail section -->

    
    <!-- *Footer -->
    <!-- Footer - Copyrights -->
    <section class="footer">        
      <footer>
        <div class="footer-text">
          &copy2025 Copyrights: <a href="" class="text-success-emphasis text-decoration-none">KampongShare &#8482; All rights reserved.</a>
        </div>        
      </footer>
    </section>
    <!-- End of Footer -->

    <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
    ></script>

  </body>
</html>
